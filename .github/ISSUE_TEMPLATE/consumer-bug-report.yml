name: Consumer bug report
description: Report a codex-sdlc-wizard problem from setup, install, update, or normal use.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a `codex-sdlc-wizard` issue.

        Do not include secrets, auth tokens, private keys, or MFA codes in this report.
  - type: input
    id: wizard_version
    attributes:
      label: Wizard version
      description: Which `codex-sdlc-wizard` version were you using?
      placeholder: "0.7.1"
    validations:
      required: true
  - type: input
    id: command_used
    attributes:
      label: Command used
      description: What exact install, setup, update, or runtime command did you run?
      placeholder: "npx codex-sdlc-wizard@0.7.1 setup --yes --model-profile maximum"
    validations:
      required: true
  - type: input
    id: repo_shape
    attributes:
      label: Repo shape or stack
      description: What kind of repo is this?
      placeholder: "Node app, docs-heavy repo, Python service, auth-heavy Windows repo"
    validations:
      required: true
  - type: input
    id: failed_step
    attributes:
      label: Failed step
      description: Where did it fail?
      placeholder: "install, setup, update, first Codex session, commit guard, release"
    validations:
      required: true
  - type: textarea
    id: visible_output
    attributes:
      label: Visible output
      description: Paste the visible output, error, or screenshot text. Redact anything sensitive.
      placeholder: "Paste the error or relevant output here"
    validations:
      required: true
  - type: dropdown
    id: auth_boundary
    attributes:
      label: Auth, MFA, or browser sign-in involved?
      description: Tell us whether the failure involved auth-heavy flows such as MFA, Windows WAM, or browser sign-in.
      options:
        - "No"
        - "Yes - browser sign-in"
        - "Yes - MFA"
        - "Yes - Windows / WAM"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect `codex-sdlc-wizard` to do instead?
      placeholder: "Describe the expected behavior"
    validations:
      required: true
